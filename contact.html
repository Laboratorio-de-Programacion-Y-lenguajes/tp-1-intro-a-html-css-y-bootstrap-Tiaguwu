<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto - Mi Blog</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/styles.css">
</head>
<body>
    <nav class="navbar navbar-expand-md navbar-dark custom-nav sticky-top">
        <div class="container-fluid">
            <img src="assets/images/navicon/rigby.jpg" alt="Rigby" width="50">
            <a class="navbar-brand fw-bold ms-4" href="index.html">Mi Blog</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#collapsibleNavbar" aria-label="Abrir menú de navegación">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="collapsibleNavbar">
                <ul class="navbar-nav gap-3">
                    <li class="nav-item">
                        <a class="nav-link fw-bold active" href="about.html">Sobre Mí</a>
                    </li>
                    <li>
                        <a href="contact.html" class="nav-link fw-bold active">Contacto</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Formulario de contacto -->
    <main class="py-5">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-md-6">
                    <h1 class="mb-4">Contacto</h1>

                    <form id="contactForm" novalidate>
                        <!-- Campo nombre (COMPLETAR: validación) -->
                        <div class="mb-3">
                            <label for="name" class="form-label">Nombre *</label>
                            <input type="text" class="form-control" id="name" name="name" required placeholder="Nombre completo">
                            <div class="invalid-feedback">
                                Por favor ingresa tu nombre.
                            </div>
                        </div>

                        <!-- Campo email (COMPLETAR) -->
                        <div class="mb-3">
                            <label for="email" class="form-label">Email *</label>
                            <input type="email" class="form-control" id="email" name="email" required placeholder="ejemplo@correo.com">
                            <div class="invalid-feedback">
                                Por favor ingresa un email válido.
                            </div>
                        </div>

                        <!-- Campo teléfono (COMPLETAR: opcional) -->
                        <div class="mb-3">
                            <label for="phone" class="form-label">Teléfono</label>
                            <input type="tel" class="form-control" id="phone" name="phone" required pattern="[0-9]+" placeholder="2901-XXXXXX">
                            <div class="invalid-feedback">
                                Por favor teléfono un email válido.
                            </div>
                        </div>

                        <!-- Campo mensaje (COMPLETAR: minlength) -->
                        <div class="mb-3">
                            <label for="message" class="form-label">Mensaje *</label>
                            <textarea class="form-control" id="message" name="message" rows="5" required minlength="10" placeholder="Escribe al menos 10 caracteres"></textarea>
                            <div class="invalid-feedback">
                                El mensaje debe tener al menos 10 caracteres.
                            </div>
                        </div>

                        <!-- Botón submit -->
                        <button type="submit" class="btn btn-primary btn-lg w-100">Enviar</button>
                    </form>
                </div>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="custom-nav text-white py-4 mt-5">
        <div class="container text-center">
            <div class="row justify-content-center align-items-center">
            <p class="mb-3">&copy; 2026 Tiago Caranchi - Estudiante UNTDF</p>
            <div class="d-flex justify-content-center gap-4">
                <a href="https://www.instagram.com/tiaguwu/" target="_blank">
                    <img src="assets/images/icon/instagram.png" alt="Instagram" width="40" class="img-fluid footer-logo">
                </a>
                <a href="https://github.com/Tiaguwu" target="_blank">
                    <img src="assets/images/icon/github.png" alt="GitHub" width="40" class="img-fluid footer-logo">
                </a>
                <a href="mailto:tiagocaranchi@hotmail.com">
                    <img src="assets/images/icon/gmail.png" alt="Email" width="40" class="img-fluid footer-logo">
                </a>
            </div>
            </div>
        </div>
    </footer>

    <!-- Script: validación HTML5 + feedback visual -->
    <script>
        const form = document.getElementById('contactForm');
        form.addEventListener('submit', (e) => {
            if (!form.checkValidity()) {
                e.preventDefault();
                e.stopPropagation();
            }
            form.classList.add('was-validated');
        });
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
